version: '3'

tasks:
  update:
    desc: Update all Nix flake dependencies (cross-platform)
    cmds:
      - task: update-linux
      - task: update-darwin
      
  update-input:
    desc: Update a specific Nix flake input (cross-platform)
    vars:
      package: '{{.package}}'
    cmds:
      - task: update-input-linux
        vars: {package: '{{.package}}'}
      - task: update-input-darwin
        vars: {package: '{{.package}}'}
    requires:
      vars: [package]

  update-input-linux:
    desc: Update a specific Nix flake input in Linux
    vars:
      package: '{{.package}}'
    dir: ./linux
    cmds:
      - nix flake lock --update-input {{.package}}
    requires:
      vars: [package]

  update-input-darwin:
    desc: Update a specific Nix flake input in Darwin
    vars:
      package: '{{.package}}'
    dir: ./darwin
    cmds:
      - nix flake lock --update-input {{.package}}
    requires:
      vars: [package]

  update-linux:
    desc: Update Linux-specific flake dependencies
    dir: ./linux
    cmds:
      - nix flake update
      
  update-darwin:
    desc: Update Darwin-specific flake dependencies
    dir: ./darwin
    cmds:
      - nix flake update

  check:
    desc: Check all flake configurations (cross-platform)
    cmds:
      - task: check-linux
      - task: check-darwin

  check-linux:
    desc: Check Linux flake configuration
    dir: ./linux
    cmds:
      - nix flake check
      
  check-darwin:
    desc: Check Darwin flake configuration
    dir: ./darwin
    cmds:
      - nix flake check