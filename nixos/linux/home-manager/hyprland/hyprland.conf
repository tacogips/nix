input {
  kb_layout = us
  follow_mouse = 1

  touchpad {
    natural_scroll = true
  }
}

general {
  gaps_in = 3
  gaps_out = 3
  border_size = 3
  col.active_border = rgba(33ccffee)
  col.inactive_border = rgba(595959aa)
  layout = dwindle
}

#decoration {
#  rounding = 10
#  blur = true
#  blur_size = 3
#  blur_passes = 1
#}

animations {
enabled = false
}

# --- environments ------------------------------
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_QPA_PLATFORM, wayland

# Font rendering for Electron apps
# References:
# - https://wiki.archlinux.org/title/HiDPI - GDK_SCALE/GDK_DPI_SCALE for GTK apps
# - https://github.com/electron/electron/issues/36632 - Electron scaling issues on Wayland
# - https://wiki.hypr.land/Configuring/Environment-variables/ - Hyprland env var config
# - https://pandasauce.org/post/linux-fonts/ - Electron font rendering solutions
env = GDK_DPI_SCALE,1.0          # Scale text only for GTK3 apps
env = GDK_SCALE,1.0              # Scale UI elements by integer factor for GTK3
env = QT_AUTO_SCREEN_SCALE_FACTOR,1  # Enable automatic DPI scaling for Qt5 apps
env = XCURSOR_SIZE,24            # Set cursor size for HiDPI displays
env = ELECTRON_ENABLE_FONT_SUBPIXEL_POSITIONING,1  # Experimental: Enable subpixel font positioning

# NOTE: If environment variables above don't fix jagged fonts in Electron apps like Slack,
# try these command line flag alternatives:
# 1. slack --disable-font-subpixel-positioning (most common fix)
# 2. slack --force-device-scale-factor=1.0
# 3. slack --disable-gpu --disable-hardware-acceleration
# 4. slack --disable-font-subpixel-positioning --force-device-scale-factor=1.0 --enable-features=WaylandWindowDecorations
# 5. slack --disable-gpu --force-device-scale-factor=1.0 (X11 fallback test)

# adujet vulkan for wayland for zed
env = VK_ICD_FILENAMES, /run/opengl-driver/share/vulkan/icd.d/nvidia_icd.x86_64.json
env = VK_LAYER_PATH, /run/opengl-driver/share/vulkan/explicit_layer.d
env = XDG_SESSION_TYPE , wayland
env = GBM_BACKEND, nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = XDG_CURRENT_DESKTOP, Hyprland

# --- workspace to monitor assignments ------------------------------
workspace = 1, monitor:DP-2, default:true     # DP-2 = workspace 1 (bottom center)
workspace = 2, monitor:HDMI-A-1, default:true # HDMI-A-1 = workspace 2 (top left)
workspace = 3, monitor:DP-3, default:true     # DP-3 = workspace 3 (top right)

# --- key binds ------------------------------
$MOD = ALT
#bind = SHIFT CTRL, M, exec, alacritty
#bind = CTRL SHIFT, L, exec, zeditor

bind = CTRL SHIFT, SPACE, exec, env NIXOS_OZONE_WL=1 ELECTRON_OZONE_PLATFORM_HINT=wayland fuzzel -p "Go: "

bind = $MOD, F, fullscreenstate,1
bind = SHIFT $MOD, J, movefocus, l
bind = SHIFT $MOD, L, movefocus, r
bind = SHIFT $MOD, H, movefocus, d

bind = CTRL $MOD, J, movewindow, l
bind = CTRL $MOD, L, movewindow, r
bind = CTRL $MOD, H, movewindow, d
bind = CTRL SHIFT, Q, killactive,


# switch workspace
bind = SHIFT $MOD, 1, workspace, 1
bind = SHIFT $MOD, 2, workspace, 2
bind = SHIFT $MOD, 3, workspace, 3
bind = SHIFT $MOD, 4, workspace, 4
bind = SHIFT $MOD, 5, workspace, 5

# move windows to the workspace
bind = CTRL $MOD, 1, movetoworkspace, 1
bind = CTRL $MOD, 2, movetoworkspace, 2
bind = CTRL $MOD, 3, movetoworkspace, 3
bind = CTRL $MOD, 4, movetoworkspace, 4
bind = CTRL $MOD, 5, movetoworkspace, 5


exec-once = waybar

# screen sharing for zoom. not used?
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
